<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Control Panel</title>
  </head>
  <body>
    <div class="dp-nav">
      <a
        onclick="
          showOnlyDiv('dp-Home');
          return false;
        "
        class="dp-nav-item"
      >
        <img src="Content/HomeIcon.png" id="dp-HomeIcon" class="dp-icon" />
        <span id="dp-HomeText" class="dp-icon-text">HOME</span>
      </a>
      <a
        onclick="
          showOnlyDiv('dp-Audio');
          return false;
        "
        class="dp-nav-item"
      >
        <img src="Content/SoundIcon.png" id="dp-AudioIcon" class="dp-icon" />
        <span id="dp-AudioText" class="dp-icon-text">AUDIO</span>
      </a>
      <a
        onclick="
          showOnlyDiv('dp-Music');
          return false;
        "
        class="dp-nav-item"
      >
        <img src="Content/MusicIcon.png" id="dp-MusicIcon" class="dp-icon" />
        <span id="dp-MusicText" class="dp-icon-text">MUSIC</span>
      </a>
      <a
        onclick="
          showOnlyDiv('dp-Apps');
          return false;
        "
        class="dp-nav-item"
      >
        <img src="Content/AppsIcon.png" id="dp-AppsIcon" class="dp-icon" />
        <span id="dp-AppsText" class="dp-icon-text">APPS</span>
      </a>
      <a
        onclick="
          showOnlyDiv('dp-Settings');
          return false;
        "
        class="dp-nav-item"
      >
        <img
          src="Content/SettingsIcon.png"
          id="dp-SettingsIcon"
          class="dp-icon"
        />
        <span id="dp-SettingsText" class="dp-icon-text">SETTINGS</span>
      </a>
    </div>

    <div id="dp-content">
      <div id="dp-Home" class="dp-section">
        <div class="dp-home-panel">
          <div class="dp-home-clock" id="dp-home-clock">--:--</div>
          <div class="dp-home-date" id="dp-home-date">---</div>
        </div>
      </div>
      <div id="dp-Audio" class="dp-section">
        <div id="dp-sliders"></div>
      </div>
      <div id="dp-Music" class="dp-section">
        <div class="dp-music-panel">
          <div class="dp-music-now">
            <div class="dp-music-thumb-wrap">
              <img id="dp-music-thumb" src="Content/NoSongIcon.png" />
            </div>
            <div class="dp-music-meta">
              <div class="dp-music-title" id="dp-music-title">Nothing playing</div>
              <div class="dp-music-artist" id="dp-music-artist">—</div>
            </div>
          </div>
          <div class="dp-music-cluster">
            <div class="dp-music-controls">
              <button class="dp-music-btn" type="button" data-action="prev">
                <img src="Content/BackIcon.png" alt="Previous" />
              </button>
              <button class="dp-music-btn dp-music-btn-primary" type="button" id="dp-music-playpause">
                <img src="Content/CurrIcon.png" alt="Play/Pause" id="dp-music-playpause-icon" />
              </button>
              <button class="dp-music-btn" type="button" data-action="next">
                <img src="Content/ForwardIcon.png" alt="Next" />
              </button>
              <button class="dp-music-btn dp-music-btn-aux dp-music-open-btn" type="button" data-action="run">
                <img src="Content/MusicRunIcon.png" alt="Run Music" />
              </button>
            </div>
            <div id="dp-music-slider" class="dp-music-slider"></div>
          </div>
        </div>
      </div>
      <div id="dp-Apps" class="dp-section">
        <div class="dp-apps-tabs">
          <button
            class="dp-apps-tab"
            type="button"
            onclick="showAppsSection('games')"
          >
            <span class="dp-apps-tab-icon">
              <img src="Content/GamesIcon.png" alt="Games" />
            </span>
            <span class="dp-apps-tab-title">Games</span>
          </button>
          <button
            class="dp-apps-tab"
            type="button"
            onclick="showAppsSection('apps')"
          >
            <span class="dp-apps-tab-icon">
              <img src="Content/AppsIcon.png" alt="Apps" />
            </span>
            <span class="dp-apps-tab-title">Apps</span>
          </button>
        </div>

        <div class="dp-apps-panels">
          <div class="dp-apps-panel dp-apps-panel-apps">
            <div class="dp-apps-list"></div>
            <div class="dp-empty-state">
              <img
                src="Content/AppsIcon.png"
                alt="No Applications"
                class="dp-empty-icon"
              />
              <span class="dp-empty-text">No applications found</span>
            </div>
          </div>
          <div class="dp-apps-panel dp-apps-panel-games">
            <div class="dp-apps-list"></div>
            <div class="dp-empty-state">
              <img
                src="Content/GamesIcon.png"
                alt="No Games"
                class="dp-empty-icon"
              />
              <span class="dp-empty-text">No games found</span>
            </div>
          </div>
        </div>
      </div>
      <div id="dp-Settings" class="dp-section">
        <div class="dp-settings-panel">
          <div class="dp-settings-grid">
            <button class="dp-setting-card" id="dp-setting-reload-page" type="button">
              <div class="dp-setting-icon">
                <img src="Content/ReloadIcon.png" alt="Reload" />
              </div>
              <div class="dp-setting-text">
                <span class="dp-setting-title">Reload Page</span>
                <span class="dp-setting-subtitle">Refresh the display</span>
              </div>
            </button>

            <div class="dp-theme-section">
              <div class="dp-setting-text">
                <span class="dp-setting-title">Theme</span>
                <span class="dp-setting-subtitle">Choose a color scheme</span>
              </div>
              <div class="dp-theme-options">
                <button class="dp-theme-option" data-theme="default" type="button">
                  <span class="dp-theme-swatch dp-theme-default"></span>
                  <span class="dp-theme-label">Default</span>
                </button>
                <button class="dp-theme-option" data-theme="graphite" type="button">
                  <span class="dp-theme-swatch dp-theme-graphite"></span>
                  <span class="dp-theme-label">Graphite</span>
                </button>
                <button class="dp-theme-option" data-theme="autumn" type="button">
                  <span class="dp-theme-swatch dp-theme-autumn"></span>
                  <span class="dp-theme-label">Autumn</span>
                </button>
                <button class="dp-theme-option" data-theme="ocean" type="button">
                  <span class="dp-theme-swatch dp-theme-ocean"></span>
                  <span class="dp-theme-label">Ocean</span>
                </button>
                <button class="dp-theme-option" data-theme="neon" type="button">
                  <span class="dp-theme-swatch dp-theme-neon"></span>
                  <span class="dp-theme-label">Neon</span>
                </button>
                <button class="dp-theme-option" data-theme="tech" type="button">
                  <span class="dp-theme-swatch dp-theme-tech"></span>
                  <span class="dp-theme-label">Tech</span>
                </button>
                <button class="dp-theme-option" data-theme="synth" type="button">
                  <span class="dp-theme-swatch dp-theme-synth"></span>
                  <span class="dp-theme-label">Synth</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      function showOnlyDiv(idToShow) {
        // Hide all sections
        const divs = document.querySelectorAll(".dp-section");
        divs.forEach((div) => (div.style.display = "none"));

        // Show desired section
        const desiredDiv = document.getElementById(idToShow);
        if (desiredDiv) desiredDiv.style.display = "block";

        // Update selected icon
        const iconContainers = document.querySelectorAll(".dp-nav-item");
        iconContainers.forEach((container) =>
          container.classList.remove("dp-selected"),
        );

        // Add selected class to clicked icon
        const selectedIcon = document.querySelector(
          `#${idToShow}Icon`,
        )?.parentElement;
        if (selectedIcon) selectedIcon.classList.add("dp-selected");
      }

      function showAppsSection(which) {
        const panels = document.querySelectorAll(".dp-apps-panel");
        panels.forEach((panel) => (panel.style.display = "none"));

        const tabs = document.querySelectorAll(".dp-apps-tab");
        tabs.forEach((tab) => tab.classList.remove("dp-selected"));

        const panel =
          which === "games"
            ? document.querySelector(".dp-apps-panel-games")
            : document.querySelector(".dp-apps-panel-apps");
        if (panel) panel.style.display = "block";

        const tabIndex = which === "games" ? 0 : 1;
        if (tabs[tabIndex]) tabs[tabIndex].classList.add("dp-selected");
      }

      // Show default section on load
      window.onload = () => {
        showOnlyDiv("dp-Home");
        showAppsSection("games");
      };
    </script>
    <link rel="stylesheet" href="style.css" />
    <script src="main.js" type="module"></script>
  </body>
</html>
